# Central description of pipeline parameters and defaults used across scripts.
# Paths are relative to the repository root unless noted.
# Scripts still use their own argparse defaults; this file is the single reference
# for Makefile / documentation (Step 1: not yet wired into Python).

paths:
  data_dir: data
  fasta_dir: fasta
  outputs_dir: outputs
  results_dir: results
  # Ephemeral / local experiment outputs (gitignored); finalized copies go under results/
  results_scratch_dir: results/scratch
  tetramer_frequencies_csv: outputs/tetramer_frequencies.csv
  uc_cap_root: outputs/uc_cap
  # CAP CSV layout from run_uc_cap_pipeline.py
  cap_csv_pattern: outputs/uc_cap/uc{n_uc}_k{n_clusters}/cap{n_cap}.csv

# Binary classification tasks (fit_tetramer_classifier.py, fit_uc_cap_classifier.py, grid_uc_cap_classifier.py)
tasks:
  - cancer_diagnosis
  - cancer_type

# Run-level tetramer pipeline: CLR → optional scaler → PCA → KNN (fit_tetramer_classifier.py).
# Model name is fixed; hyperparameters are tuned from CLI defaults below.
tetramer:
  model: knn
  default_task: cancer_diagnosis
  default_random_state: 0
  default_clr_pseudocount: 1.0e-6
  default_pca_min_variance: 0.9
  default_n_neighbors_grid: "5,15"
  default_weights_grid: "uniform,distance"
  default_val_scoring: f1_weighted

# build_uc_cap_sequence_cache.py — rows kept per run in the Parquet cache.
sequence_cache:
  n_max_per_run: 1000
  input_suffix: ".csv.xz"
  parquet_compression: zstd

# Defaults for run_uc_cap_pipeline.py (shared with Makefile / future wrappers).
run_uc_cap_defaults:
  random_state: 0
  pca_variance: 0.95
  pca_components: null
  seq_normalize: true
  seq_log1p: false
  cap_transform: none
  clr_pseudocount: 1.0e-6
  batch_size: 8192
  max_iter: 200
  chunk_size: 20000

# UC/CAP supervised models (fit_uc_cap_classifier.py, grid_uc_cap_classifier.py)
uc_cap_classifiers:
  - random_forest
  - logistic_regression
  - svm

# Exact (n_uc, n_clusters, n_cap) triples used by scripts/grid_uc_cap_pipeline.py.
# n_cap is only 5000 and 10000 here; n_uc is 1000 or 2000; n_clusters is 2000 or 5000.
uc_cap_pipeline_grid:
  - { n_uc: 10, n_clusters: 20, n_cap: 50 }
  - { n_uc: 20, n_clusters: 20, n_cap: 50 }
  - { n_uc: 10, n_clusters: 50, n_cap: 50 }
  - { n_uc: 20, n_clusters: 50, n_cap: 50 }
  - { n_uc: 10, n_clusters: 20, n_cap: 100 }
  - { n_uc: 20, n_clusters: 20, n_cap: 100 }
  - { n_uc: 10, n_clusters: 50, n_cap: 100 }
  - { n_uc: 20, n_clusters: 50, n_cap: 100 }

