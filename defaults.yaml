# Central description of pipeline parameters and defaults used across scripts.
# Paths are relative to the repository root unless noted.
# Scripts load defaults from this file; some experiment runners may overlay values from experiments.yaml.
# Keep values here as the single source of truth for pipeline defaults.

paths:
  datasets_csv: datasets.csv
  data_dir: data
  fasta_dir: fasta
  outputs_dir: outputs
  results_dir: results
  # Ephemeral / local experiment outputs (gitignored); finalized copies go under results/
  results_scratch_dir: results/scratch
  # Run-level tetramer frequency table (input for scripts/fit_classifier.py --tetramer).
  tetramer_frequencies_csv: outputs/tetramer_frequencies.csv
  uc_cap_root: outputs/uc_cap
  # Feature-only per-run HyenaDNA tensors from scripts/build_run_tensors.py.
  run_tensors_dir: outputs/run_tensors

# Canonical Run -> train/val/test/holdout assignment (scripts/shared_utilities.py).
shared_splits:
  random_state: 0

# Classifier training defaults (scripts/fit_classifier.py).
# Optional --expt overlays fit_classifier.exeriments config (from experiments.yaml).
# Optional --feat (UC/CAP only) selects run_uc_cap_pipeline rows merged over this baseline.
fit_classifier:
  # Classifier family: baseline, knn, random_forest, logistic_regression, svm.
  model: knn
  # Binary task: cancer_diagnosis or cancer_type.
  task: cancer_diagnosis
  # Random seed for PCA and model initialization.
  random_state: 0
  # Whether StandardScaler is applied before PCA.
  use_scaler: true
  # Whether CLR is applied before scaler/PCA.
  use_clr: true
  # Additive constant before log in CLR.
  clr_pseudocount: 1.0e-6
  # Minimum cumulative explained variance for PCA candidate grid.
  pca_min_variance: 0.9
  # Comma-separated KNN n_neighbors grid.
  n_neighbors_grid: "5,15"
  # Comma-separated KNN weights grid.
  weights_grid: "uniform,distance"
  # Comma-separated random forest n_estimators grid.
  rf_n_estimators_grid: "200,500"
  # Comma-separated random forest max_depth grid (use 'none' for unlimited).
  rf_max_depth_grid: "none,10"
  # Comma-separated random forest min_samples_leaf grid.
  rf_min_samples_leaf_grid: "1,2"
  # Comma-separated logistic regression C grid.
  lr_c_grid: "0.1,1.0,10.0"
  # Comma-separated logistic regression solver grid.
  lr_solver_grid: "lbfgs,liblinear"
  # Comma-separated logistic regression class_weight grid (use 'none' for default).
  lr_class_weight_grid: "none,balanced"
  # Comma-separated SVM RBF/linear/etc. C grid (shared for tetramer and UC/CAP).
  svm_c_grid: "0.1,1.0,10.0"
  # Comma-separated SVM gamma grid (sklearn string tokens scale/auto or floats).
  svm_gamma_grid: "scale,auto"
  # Comma-separated SVM kernel grid.
  svm_kernel_grid: "rbf"
  # Validation metric to maximize during hyperparameter tuning.
  val_scoring: f1_weighted
  # Optional output path for metrics JSON; null disables JSON output (experiments may set via template).
  results_json: null

# build_uc_cap_sequence_cache.py — rows kept per run in the Parquet cache.
sequence_cache:
  n_max_per_run: 10000
  parquet_compression: zstd

# Baseline UC/CAP pipeline parameters. The script takes only --feat; list entries here are
# merged in order into one baseline dict, then experiments.yaml rows merge over that for --feat >= 1 (Makefile FEAT=...).
run_uc_cap_pipeline:
  # n_uc: Number of cached sequences per run used to fit UC (MiniBatchKMeans on train runs only).
  # n_clusters: K for k-means (number of cluster centroids / CAP feature dimension).
  # n_cap: Sequences per run for CAP, or the string 'all' to stream every sequence from per-run
  #   count files under paths.outputs_dir (see run_uc_cap_pipeline.py).
  - { n_uc: 10, n_clusters: 20, n_cap: 50 }
  # Remaining keys (second list fragment merges over the triple above).
  - random_state: 0 # Random seed for PCA and MiniBatchKMeans.
    # Cumulative explained-variance target for PCA when pca_components is null.
    pca_variance: 0.95
    # Fixed PCA component count before k-means; null means use pca_variance instead.
    pca_components: null
    # Whether to normalize each sequence 4-mer vector to relative frequencies before further transforms.
    seq_normalize: true
    # Whether to apply log1p after optional per-sequence normalization.
    seq_log1p: false
    # Post-aggregation transform on run-level CAP vectors: none or clr.
    cap_transform: 'none'
    # Pseudocount added to proportions when cap_transform is clr.
    clr_pseudocount: 1.0e-6
    # MiniBatchKMeans batch size.
    batch_size: 8192
    # MiniBatchKMeans max iterations.
    max_iter: 200
    # CSV row chunk size when n_cap is all (streaming from per-run count files).
    chunk_size: 20000

# Feature-only run tensor cache (scripts/build_run_tensors.py).
# One .pt file per run under paths.run_tensors_dir/.
run_tensors:
  seq_offset: 0
  num_sets: 10
  max_length: 16384
  max_workers: 4

# HyenaDNA fine-tuning (scripts/train_hyenadna.py).
# Optional --expt overlays train_hyenadna.experiments in experiments.yaml (1-based index).
train_hyenadna:
  # Binary task: cancer_diagnosis or cancer_type (same label rules as fit_classifier).
  task: cancer_diagnosis
  # Pretrained checkpoint name under checkpoint_dir (see LongSafari/* on Hugging Face).
  model: hyenadna-small-32k-seqlen
  # Non-overlapping sequence sets per Run (each set packed to max_length tokens).
  num_sets: 5
  # Max sequence length; null = use bundled default for model (e.g. 1024 / 32768).
  max_length: 1024
  # SequenceDecoder head mode in hyenadna/standalone_hyenadna.py: last, first, pool, sum.
  head_pooling_mode: pool
  # How to combine set-level logits into one prediction per Run at eval: mean or max.
  run_logits_aggregate: mean
  # Directory with downloaded HyenaDNA weights (see HyenaDNAPreTrainedModel.from_pretrained).
  checkpoint_dir: checkpoints
  # If true, git clone weights from Hugging Face when missing locally.
  download_pretrained: false
  # If true, only train the classification head.
  freeze_backbone: false
  # Optimization
  epochs: 1
  # Batch size accepts a positive integer, or exactly 0.5 to train one run at a time
  # with two micro-passes over set slices [0:5] and [5:10] (requires num_sets: 10).
  batch_size: 8
  # Optional mixed precision on CUDA. When false, training runs in float32.
  amp: true
  # Low-precision dtype for AMP autocast: float16 or bfloat16.
  amp_dtype: float16
  learning_rate: 1.0e-4
  weight_decay: 0.01
  num_workers: 0
  random_seed: 0
  # Device: cuda, cpu, or null / auto for torch.cuda.is_available().
  device: null
  # Optional metrics JSON path; null disables. Empty string (CLI --results-json) uses
  # results/scratch/train_hyenadna_<task>_<utc>.json. Experiments may set via template.
  results_json: null

