fit_classifier:
  results_json_template: results/{features}/{name}.json
  experiments:
    - name: cancer_diagnosis_baseline
      overrides:
        task: cancer_diagnosis
        model: baseline

    - name: cancer_diagnosis_knn
      overrides:
        task: cancer_diagnosis
        model: knn

    - name: cancer_diagnosis_svm
      overrides:
        task: cancer_diagnosis
        model: svm

    - name: cancer_diagnosis_random_forest
      overrides:
        task: cancer_diagnosis
        model: random_forest

    - name: cancer_type_baseline
      overrides:
        task: cancer_type
        model: baseline

    - name: cancer_type_knn
      overrides:
        task: cancer_type
        model: knn

    - name: cancer_type_svm
      overrides:
        task: cancer_type
        model: svm

    - name: cancer_type_random_forest
      overrides:
        task: cancer_type
        model: random_forest

# Flat list merged shallowly over the defaults.yaml run_uc_cap_pipeline baseline (feature sets; --feat 1..N).
run_uc_cap_pipeline:
  - { n_uc:  500, n_clusters: 1000, n_cap: 2000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 2000 }
  - { n_uc:  500, n_clusters: 2000, n_cap: 2000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 2000 }
  - { n_uc:  500, n_clusters: 1000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 5000 }
  - { n_uc:  500, n_clusters: 2000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 5000 }

extract_embeddings:
  - { num_sets: 5, max_length: 1024 }
  - { num_sets: 5, max_length: 2048 }
  - { num_sets: 5, max_length: 4096 }
  - { num_sets: 5, max_length: 8192 }
  - { num_sets: 5, max_length: 16384 }
  
train_hyenadna:
  results_json_template: results/hyenadna/{task_abbrv}_{name}_{max_length/1024}k_s{seed}.json
  # Extra retries per child after SIGSEGV (signal 11) - often from native code (CUDA / cuDNN / GPU driver)
  sigsegv_retries: 2
  # Training script supports grids over task and random_seed
  # (e.g. task: [cancer_diagnosis,cancer_type], random_seed: [0,1,2])
  experiments:
    # Timings to run 3 seeds over 10 epochs (5 sets and 2048 max_length):
    # - Unfrozen backbone (batch_size=20 for 15GB GPU memory):
    #   cancer_diagnosis (26 min), cancer_type (13 min), multitask (24 min)
    # - Frozen backbone (batch_size=80 for 15GB GPU memory):
    #   multitask (15 min)
    # Estimated total time for 6 multitask experiments with 5 seeds:
    #   5/3 * (4 * 15 + 2 * 24) = 180 min (3 hr)
    - name: best_recipe  # EXPT=1
      overrides:
        random_seed: [0,1,2,3,4]
    - name: high_lr  # EXPT=2
      overrides:
        random_seed: [0,1,2,3,4]
        learning_rate: 5.0e-4
    - name: dropout_0.2  # EXPT=3
      overrides:
        random_seed: [0,1,2,3,4]
        head_dropout: 0.2
    - name: hidden_256  # EXPT=4
      overrides:
        random_seed: [0,1,2,3,4]
        head_hidden: 256
    - name: unfrozen_backbone  # EXPT=5
      overrides:
        random_seed: [0,1,2,3,4]
        freeze_backbone_epochs: 0
        batch_size: 20
    - name: unfrozen_backbone_low_lr  # EXPT=6
      overrides:
        random_seed: [0,1,2,3,4]
        freeze_backbone_epochs: 0
        learning_rate: 1.0e-5
        batch_size: 20
    # Increasing max_length experiment grid (ca. 9.5 hr)
    - name: max_length_1024  # EXPT=7 (14 min)
      overrides:
        random_seed: [0,1,2,3]
        max_length: 1024
        batch_size: 160
    - name: max_length_2048  # EXPT=8 (20 min)
      overrides:
        random_seed: [0,1,2,3]
        max_length: 2048
        batch_size: 80
    - name: max_length_4096  # EXPT=9 (35 min)
      overrides:
        random_seed: [0,1,2,3]
        max_length: 4096
        batch_size: 40
    - name: max_length_8192  # EXPT=10 (66 min)
      overrides:
        random_seed: [0,1,2,3]
        max_length: 8192
        batch_size: 20
    - name: max_length_16384  # EXPT=11 (128 min)
      overrides:
        random_seed: [0,1,2,3]
        max_length: 16384
        batch_size: 10
    - name: max_length_32768  # EXPT=12 (307 min)
      overrides:
        random_seed: [0,1,2,3]
        max_length: 32768
        batch_size: 5
