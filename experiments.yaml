fit_classifier:
  results_json_template: results/{features}/{name}.json
  experiments:
    - name: cancer_diagnosis_baseline
      overrides:
        task: cancer_diagnosis
        model: baseline

    - name: cancer_diagnosis_knn
      overrides:
        task: cancer_diagnosis
        model: knn

    - name: cancer_diagnosis_svm
      overrides:
        task: cancer_diagnosis
        model: svm

    - name: cancer_diagnosis_random_forest
      overrides:
        task: cancer_diagnosis
        model: random_forest

    - name: cancer_type_baseline
      overrides:
        task: cancer_type
        model: baseline

    - name: cancer_type_knn
      overrides:
        task: cancer_type
        model: knn

    - name: cancer_type_svm
      overrides:
        task: cancer_type
        model: svm

    - name: cancer_type_random_forest
      overrides:
        task: cancer_type
        model: random_forest

# Flat list merged shallowly over the defaults.yaml run_uc_cap_pipeline baseline (feature sets; --feat 1..N).
run_uc_cap_pipeline:
  - { n_uc: 1000, n_clusters: 2000, n_cap: 5000 }
  - { n_uc: 2000, n_clusters: 2000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 5000, n_cap: 5000 }
  - { n_uc: 2000, n_clusters: 5000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 10000 }
  - { n_uc: 2000, n_clusters: 2000, n_cap: 10000 }
  - { n_uc: 1000, n_clusters: 5000, n_cap: 10000 }
  - { n_uc: 2000, n_clusters: 5000, n_cap: 10000 }

extract_embeddings:
  - { num_sets: 5, max_length: 1024 }
  - { num_sets: 5, max_length: 2048 }
  - { num_sets: 5, max_length: 4096 }
  - { num_sets: 5, max_length: 8192 }
  - { num_sets: 5, max_length: 16384 }
  
train_hyenadna:
  results_json_template: results/hyenadna/{task_abbrv}_{name}_{max_length/1024}k_s{seed}.json
  experiments:
    # Timings to run 3 seeds over 10 epochs for 5 sets and 2048 max_length
    #   (with batch_size=20 uses ca. 15000 MiB GPU memory):
    #   - about 26 minutes for cd_* experiments
    #   - about 13 minutes for ct_* experiments
    # Estimated total time for 6 experiments with 5 seeds and 30 epochs:
    #   6 * (26 + 13) * 5/3 * 30/10 = 1170 minutes (19.5 hours)
    - name: best_recipe  # 1
      overrides:
        task: "cancer_diagnosis,cancer_type"
        random_seed: "0,1,2,3,4"
    - name: no_study_balanced  # 2
      overrides:
        task: "cancer_diagnosis,cancer_type"
        random_seed: "0,1,2,3,4"
        train_sampler: random
    - name: no_class_weight  # 3
      overrides:
        task: "cancer_diagnosis,cancer_type"
        random_seed: "0,1,2,3,4"
        class_weight: none
    - name: high_lr  # 4
      overrides:
        task: "cancer_diagnosis,cancer_type"
        random_seed: "0,1,2,3,4"
        learning_rate: 1.0e-4
    - name: hi_adv_weight  # 5
      overrides:
        task: "cancer_diagnosis,cancer_type"
        random_seed: "0,1,2,3,4"
        study_adv_weight: 0.6
    - name: no_dann  # 6
      overrides:
        task: "cancer_diagnosis,cancer_type"
        random_seed: "0,1,2,3,4"
        study_adv: false
